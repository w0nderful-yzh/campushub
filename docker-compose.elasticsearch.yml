services:
  campushub-elasticsearch:
    build:
      context: ./docker/elasticsearch
      args:
        STACK_VERSION: 8.13.4
    image: campushub-elasticsearch-ik:8.13.4
    container_name: campushub-elasticsearch
    environment:
      - node.name=campushub-elasticsearch
      - cluster.name=campushub-search
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - bootstrap.memory_lock=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - campushub-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  campushub-kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: campushub-kibana
    depends_on:
      campushub-elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://campushub-elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"

volumes:
  campushub-es-data:
